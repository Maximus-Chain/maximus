name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maximus-chain/maximusd
  DOCKER_BUILDKIT: 1

jobs:
  # ============================================
  # Job: Build AMD64
  # ============================================
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-amd64
          key: ${{ runner.os }}-buildx-amd64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-amd64-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          
          platforms: linux/amd64
          load: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-build
          cache-from: type=local,src=/tmp/.buildx-cache-amd64
          cache-to: type=local,dest=/tmp/.buildx-cache-amd64-new,mode=max

      - name: Verify image
        run: |
          docker run --rm --entrypoint /usr/local/bin/maximusd \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-build --version

      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache-amd64
          mv /tmp/.buildx-cache-amd64-new /tmp/.buildx-cache-amd64 2>/dev/null || true

  # ============================================
  # Job: Build ARM64
  # ============================================
  build-arm64:
    name: Build arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-arm64
          key: ${{ runner.os }}-buildx-arm64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm64-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          
          platforms: linux/arm64
          load: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-build
          cache-from: type=local,src=/tmp/.buildx-cache-arm64
          cache-to: type=local,dest=/tmp/.buildx-cache-arm64-new,mode=max

      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache-arm64
          mv /tmp/.buildx-cache-arm64-new /tmp/.buildx-cache-arm64 2>/dev/null || true

  # ============================================
  # Job: Unit Tests
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: ubuntu:focal
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export TZ=UTC
          apt-get update
          apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils bison python3 libevent-dev \
            libboost-system-dev libboost-filesystem-dev libboost-test-dev \
            libsqlite3-dev libgmp-dev libminiupnpc-dev libnatpmp-dev \
            libzmq3-dev

      - name: Build depends
        run: |
          make -j$(nproc) HOST=x86_64-pc-linux-gnu

      - name: Configure
        env:
          CONFIG_SITE: ${{ github.workspace }}/depends/x86_64-pc-linux-gnu/share/config.site
        run: |
          ./autogen.sh
          ./configure --prefix=${{ github.workspace }}/depends/x86_64-pc-linux-gnu
          make -j$(nproc)

      - name: Run tests
        run: |
          make check

  # ============================================
  # Job: Push AMD64 to Registry
  # ============================================
  push-amd64:
    name: Push amd64
    needs: [build-amd64]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master'))
      || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-amd64
          key: ${{ runner.os }}-buildx-amd64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-amd64-

      - name: Build and Push AMD64 image
        uses: docker/build-push-action@v6
        with:
          
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-build
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: type=local,src=/tmp/.buildx-cache-amd64
          cache-to: type=local,dest=/tmp/.buildx-cache-amd64-new,mode=max

      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache-amd64
          mv /tmp/.buildx-cache-amd64-new /tmp/.buildx-cache-amd64 2>/dev/null || true

  # ============================================
  # Job: Push ARM64 to Registry
  # ============================================
  push-arm64:
    needs: [build-arm64]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master'))
      || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-arm64
          key: ${{ runner.os }}-buildx-arm64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm64-

      - name: Build and Push ARM64 image
        uses: docker/build-push-action@v6
        with:
          
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-build
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64
            ${{ (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && format('{0}/{1}:latest-arm64', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: type=local,src=/tmp/.buildx-cache-arm64
          cache-to: type=local,dest=/tmp/.buildx-cache-arm64-new,mode=max

      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache-arm64
          mv /tmp/.buildx-cache-arm64-new /tmp/.buildx-cache-arm64 2>/dev/null || true

      - name: Image pushed info
        run: |
          echo "ARM64 image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64"

  # ============================================
  # Job: Generate SBOM (runs after both pushes)
  # ============================================
  sbom:
    name: Generate SBOM
    needs: [push-amd64, push-arm64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM for AMD64
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom-amd64.spdx.json

      - name: Generate SBOM for ARM64
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          format: spdx-json
          output-file: sbom-arm64.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-amd64
          path: sbom-amd64.spdx.json

      - name: Upload SBOM artifacts ARM64
        uses: actions/upload-artifact@v4
        with:
          name: sbom-arm64
          path: sbom-arm64.spdx.json

      - name: Summary
        run: |
          echo "## Build Summary"
          echo ""
          echo "### Images pushed:"
          echo "- amd64: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "- arm64: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64"
          echo ""
          echo "### All available tags:"
          echo "  - latest, latest-arm64 (master branch)"
          echo "  - develop, develop-arm64 (develop branch)"
          echo "  - v1.x.x, v1.x.x-arm64 (version tags)"
          echo "  - sha-xxx, sha-xxx-arm64 (every commit)"